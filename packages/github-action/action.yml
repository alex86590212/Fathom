name: Fathom
description: Comment-only PR risk report from test honesty analysis
author: Fathom

inputs:
  path:
    description: Path to analyze (default tests/)
    required: false
    default: tests/
  python-version:
    description: Python version for fathom analyzer
    required: false
    default: "3.11"

runs:
  using: node20
  main: dist/index.js

branding:
  icon: radar
  color: green
