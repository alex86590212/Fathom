[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "fathom-analyzer"
version = "0.1.0"
description = "Fathom code risk analyzer — test honesty, comprehension scoring"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "click>=8.1",
    "rich>=13.0",
    "watchdog>=4.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "ruff>=0.4",
]

[project.scripts]
fathom = "fathom.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["fathom"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py311"
